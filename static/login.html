<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Aurion IA</title>
  <link rel="icon" type="image/png" href="/static/image/aurion-icon-v3.1.png">
  <link rel="stylesheet" href="/static/css/base.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <h1 class="login-brand"><span class="brand-aurion">Aurion</span> <span class="brand-ia">IA</span></h1>
      <p class="subtitle">Entre para acessar o chat</p>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" value="admin@example.com" required autocomplete="email">
        <input type="password" id="password" placeholder="Senha" value="admin123" required autocomplete="current-password">
        <button type="submit">Entrar</button>
      </form>
      <p id="login-error" class="login-error"></p>
    </div>
  </div>
  <script src="/static/js/auth.js"></script>
  <script>
    // Aplica tema salvo imediatamente (antes de renderizar)
    (function () {
      const saved = localStorage.getItem('maggiore_theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
    })();
  </script>
</body>
</html>
